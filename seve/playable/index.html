<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SÈVE — prototype jouable</title>
<!-- Réutilise LE moteur (zéro divergence avec le simulateur d'équilibrage) -->
<script src="../simulator/engine.js"></script>
<style>
  :root{
    --bg:#f4efe2; --panel:#fffdf6; --ink:#33291c; --line:#d8cdb4; --accent:#5a7d3c;
    --c0:#009E73; --c1:#D55E00; --c2:#caa800; --c3:#CC79A7; /* daltonien-safe */
  }
  *{box-sizing:border-box}
  body{margin:0;font:15px/1.45 system-ui,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--ink)}
  header{background:var(--accent);color:#fff;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
  header h1{font-size:19px;margin:0;letter-spacing:.5px}
  header .sub{opacity:.85;font-size:13px}
  main{max-width:1080px;margin:0 auto;padding:16px;display:grid;grid-template-columns:460px 1fr;gap:16px}
  @media(max-width:920px){main{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px}
  h2{font-size:14px;text-transform:uppercase;letter-spacing:.8px;color:var(--accent);margin:0 0 10px}
  /* setup */
  #setup label{display:block;margin:10px 0 4px;font-weight:600}
  select,button{font:inherit}
  button{cursor:pointer;border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 14px}
  button.primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}
  button:disabled{opacity:.4;cursor:not-allowed}
  /* ring */
  #ringWrap{position:relative;width:430px;height:430px;margin:0 auto}
  .plot{position:absolute;width:70px;height:70px;border-radius:50%;border:3px solid #0003;
    display:flex;flex-direction:column;align-items:center;justify-content:center;transform:translate(-50%,-50%);
    transition:.12s;user-select:none}
  .plot .icon{font-size:20px;line-height:1}
  .plot .seeds{font-weight:800;font-size:19px}
  .plot .pid{position:absolute;top:-2px;left:-2px;font-size:10px;background:#0006;color:#fff;border-radius:6px;padding:0 4px}
  .plot.legal{cursor:pointer;box-shadow:0 0 0 3px #5a7d3c}
  .plot.legal:hover{transform:translate(-50%,-50%) scale(1.08)}
  .plot.land{box-shadow:0 0 0 4px #d55e00, 0 0 14px #d55e00aa}
  .plot.path{outline:3px dashed #00000040;outline-offset:2px}
  #center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;width:150px}
  #center .big{font-size:13px;color:#7a6f58}
  /* players */
  .pl{border:1px solid var(--line);border-radius:10px;padding:8px 10px;margin-bottom:8px}
  .pl.cur{border-color:var(--accent);box-shadow:0 0 0 2px #5a7d3c33}
  .pl .top{display:flex;justify-content:space-between;font-weight:700}
  .basket{display:flex;gap:10px;margin-top:4px;flex-wrap:wrap;font-size:14px}
  .basket .b{display:inline-flex;align-items:center;gap:3px}
  .pts{font-weight:800}
  /* preview + log */
  #preview{min-height:42px;font-size:14px;background:#fbf7ea;border:1px dashed var(--line);border-radius:8px;padding:8px;margin:8px 0}
  #log{height:200px;overflow:auto;font-size:13px;background:#fbf7ea;border:1px solid var(--line);border-radius:8px;padding:8px}
  #log div{padding:2px 0;border-bottom:1px solid #efe7d2}
  .you{color:#2c5e1f;font-weight:600}
  table{border-collapse:collapse;width:100%;font-size:12.5px;margin-top:6px}
  th,td{border:1px solid var(--line);padding:3px 6px;text-align:center}
  tr.chosen{background:#e7f0db;font-weight:700}
  .hint{font-size:12.5px;color:#7a6f58}
  .badge{display:inline-block;border-radius:6px;padding:1px 6px;color:#fff;font-size:12px;font-weight:700}
</style>
</head>
<body>
<header>
  <div><h1>🌱 SÈVE</h1><span class="sub">le potager partagé en cercle — prototype</span></div>
  <div id="hstatus" class="sub"></div>
</header>

<main>
  <!-- COLONNE GAUCHE : plateau -->
  <section class="card">
    <div id="setup">
      <h2>Nouvelle partie</h2>
      <label>Adversaires IA</label>
      <select id="nbots"><option value="1">1 (2 joueurs)</option><option value="2">2 (3 joueurs)</option><option value="3" selected>3 (4 joueurs)</option></select>
      <label>Difficulté des IA</label>
      <select id="diff">
        <option value="greedy">Facile — « attrape la plus grosse récolte »</option>
        <option value="contrarian">Moyen — joue le déni</option>
        <option value="balanced" selected>Difficile — vise les bouquets et évite de te nourrir</option>
      </select>
      <p class="hint">Tu es le jardinier 🟢 <b>VOUS</b>. Premier joueur tiré au sort, puis sens horaire ; il tourne à chaque manche.</p>
      <button class="primary" onclick="startGame()">Planter la saison ▸</button>
    </div>
    <div id="board" style="display:none">
      <div id="ringWrap"><div id="center"></div></div>
      <div id="preview" class="hint">Survole une parcelle pour voir où ta poignée s'épuise.</div>
    </div>
  </section>

  <!-- COLONNE DROITE : joueurs, log, why -->
  <section>
    <div class="card" id="playersCard" style="display:none">
      <h2>Jardiniers</h2>
      <div id="players"></div>
    </div>
    <div class="card" id="logCard" style="display:none;margin-top:16px">
      <h2 style="display:flex;justify-content:space-between;align-items:center">Journal
        <button onclick="showWhy()" id="whyBtn" title="debug + apprentissage">🤔 Pourquoi l'IA ?</button></h2>
      <div id="why"></div>
      <div id="log"></div>
    </div>
  </section>
</main>

<script>
const E = window.SeveEngine;
const ICON = E.TYPE_ICONS, SHAPE = E.TYPE_SHAPES, NAME = E.TYPE_NAMES;
const COL = ['var(--c0)','var(--c1)','var(--c2)','var(--c3)'];
const HUMAN = 0;
let M = null, cfg = null, rng = null, busy = false;

function log(html, cls){ const d=document.createElement('div'); if(cls)d.className=cls; d.innerHTML=html; const L=document.getElementById('log'); L.prepend(d); }
function pchip(seat){ return seat===HUMAN ? '<span class="you">VOUS</span>' : 'IA '+seat; }
function cropTag(t){ return `<span style="color:${COL[t]}">${ICON[t]}${SHAPE[t]}</span>`; }

function startGame(){
  const nbots = +document.getElementById('nbots').value;
  const diff = document.getElementById('diff').value;
  const n = nbots+1;
  cfg = E.defaultConfig();
  rng = E.makeRng((Date.now()>>>0) ^ (Math.random()*1e9>>>0));
  const seats = []; for(let i=0;i<n;i++) seats.push(i===HUMAN?null:diff);
  M = E.createMatch(n, cfg, seats, rng, {});
  document.getElementById('setup').style.display='none';
  document.getElementById('board').style.display='block';
  document.getElementById('playersCard').style.display='block';
  document.getElementById('logCard').style.display='block';
  document.getElementById('log').innerHTML='';
  document.getElementById('why').innerHTML='';
  buildRing();
  log(`🌧️ Pluie de la manche 1 : 9 graines tombées au hasard.`);
  render();
  pump();
}

function buildRing(){
  const wrap=document.getElementById('ringWrap');
  wrap.querySelectorAll('.plot').forEach(e=>e.remove());
  const n=cfg.nPlots, R=180, cx=215, cy=215;
  for(let i=0;i<n;i++){
    const a=-Math.PI/2 + i*2*Math.PI/n;
    const el=document.createElement('div');
    el.className='plot'; el.id='plot'+i;
    el.style.left=(cx+R*Math.cos(a))+'px'; el.style.top=(cy+R*Math.sin(a))+'px';
    el.innerHTML=`<span class="pid">${i}</span><span class="icon"></span><span class="seeds"></span>`;
    el.onmouseenter=()=>preview(i); el.onmouseleave=clearPreview;
    el.onclick=()=>humanPlay(i);
    wrap.appendChild(el);
  }
}

function render(){
  const s=M.state;
  // plots
  for(let i=0;i<cfg.nPlots;i++){
    const t=cfg.types[i], el=document.getElementById('plot'+i);
    el.style.background = COL[t]; el.style.color = t===2?'#3a2f00':'#fff';
    el.querySelector('.icon').textContent = ICON[t]+SHAPE[t];
    el.querySelector('.seeds').textContent = s.ring[i];
    el.classList.remove('legal','land','path');
  }
  const human = E.currentIsHuman(M);
  if(human && !M.done){ E.legalMoves(s).forEach(i=>document.getElementById('plot'+i).classList.add('legal')); }
  // center
  document.getElementById('center').innerHTML = M.done ? '<div class="big">Saison finie</div>' :
    `<div class="big">Manche</div><div style="font-size:22px;font-weight:800">${M.round+1}/${M.maxRounds}</div>`;
  // players
  const P=document.getElementById('players'); P.innerHTML='';
  const sc=E.scores(s);
  for(let p=0;p<s.nPlayers;p++){
    const b=s.baskets[p];
    const div=document.createElement('div');
    div.className='pl'+((s.current===p&&!M.done)?' cur':'');
    div.innerHTML=`<div class="top"><span>${pchip(p)} ${s.current===p&&!M.done?'⬅︎':''}</span>
      <span class="pts">${sc[p].points} pts</span></div>
      <div class="basket">${b.map((c,t)=>`<span class="b" style="color:${COL[t]}">${ICON[t]}${SHAPE[t]} ${c}</span>`).join('')}
      <span class="b">💐 ${sc[p].bouquets}</span></div>`;
    P.appendChild(div);
  }
  document.getElementById('hstatus').textContent = M.done ? '' :
    (human ? '▶ À vous de jouer' : '⏳ Les IA jouent…');
  if(M.done) endGame(sc);
}

function preview(i){
  if(busy||M.done||!E.currentIsHuman(M)) return;
  if(M.state.ring[i]===0){ document.getElementById('preview').innerHTML='<span class="hint">Parcelle vide — impossible de semer ici.</span>'; return; }
  // réutilise l'évaluation du moteur (même info que l'IA)
  const c = E.evaluateMoves(M.state,'balanced',rng).find(x=>x.start===i);
  // surligne le chemin + l'atterrissage
  for(let k=1;k<=c.seeds;k++){ const idx=(i+k)%cfg.nPlots; document.getElementById('plot'+idx).classList.add(k===c.seeds?'land':'path'); }
  document.getElementById('preview').innerHTML =
    `Semer la parcelle <b>${i}</b> (${c.seeds} graines) → atterrit en <b>${c.landing}</b> et récolte <b>${cropTag(c.type)} ×${c.gained}</b>.
     <span class="hint"> | Δscore +${c.deltaScore} · tu offres au suivant une récolte de ${c.giftToNext}.</span>`;
}
function clearPreview(){ if(busy)return; for(let i=0;i<cfg.nPlots;i++)document.getElementById('plot'+i)?.classList.remove('land','path'); }

function humanPlay(i){
  if(busy||M.done||!E.currentIsHuman(M)) return;
  if(M.state.ring[i]===0) return;
  const info=E.matchPlay(M,i);
  log(`${pchip(HUMAN)} sème la parcelle ${info.start} (${info.seeds} gr.) → récolte ${cropTag(info.type)}×${info.gained}`,'you');
  clearPreview(); render(); pump();
}

// fait jouer les IA une par une, avec une petite pause, jusqu'au tour humain / fin
function pump(){
  if(M.done){ render(); return; }
  if(E.currentIsHuman(M)){ render(); return; }
  busy=true; render();
  setTimeout(()=>{
    const prevRound=M.round;
    const info=E.matchPlay(M);
    const ai=M.lastAI;
    log(`${pchip(ai.seat)} <span class="hint">(${ai.strat})</span> sème ${info.start} (${info.seeds} gr.) → récolte ${cropTag(info.type)}×${info.gained}`);
    if(M.round>prevRound && !M.done) log(`🌧️ Pluie de la manche ${M.round+1}.`);
    busy=false; pump();
  }, 520);
}

function showWhy(){
  const w=document.getElementById('why');
  if(!M||!M.lastAI){ w.innerHTML='<p class="hint">Aucune IA n\'a encore joué.</p>'; return; }
  const ai=M.lastAI;
  let h=`<p class="hint">Dernier coup — ${pchip(ai.seat)} (<b>${ai.strat}</b>). L'IA a noté chaque semis possible :</p>
   <table><tr><th>parcelle</th><th>graines</th><th>atterrit→</th><th>récolte</th><th>Δscore</th><th>don au suivant</th><th>valeur</th></tr>`;
  ai.candidates.slice(0,8).forEach(c=>{
    h+=`<tr class="${c.start===ai.move?'chosen':''}"><td>${c.start}</td><td>${c.seeds}</td><td>${c.landing} ${cropTag(c.type)}</td>
      <td>×${c.gained}</td><td>${c.deltaScore>=0?'+':''}${c.deltaScore}</td><td>${c.giftToNext}</td><td>${c.value.toFixed(2)}</td></tr>`;
  });
  h+='</table><p class="hint">La ligne verte = le coup choisi (valeur la plus haute selon sa stratégie).</p>';
  w.innerHTML=h;
}

function endGame(sc){
  let best=-1,wi=[]; sc.forEach((x,i)=>{ if(x.points>best){best=x.points;wi=[i]} else if(x.points===best)wi.push(i); });
  const win=wi[0];
  document.getElementById('hstatus').innerHTML = win===HUMAN?'🏆 Vous gagnez !':`🏁 ${pchip(win)} gagne`;
  log(`<b>Fin de saison.</b> ${pchip(win)} l'emporte avec ${best} pts.`);
  const c=document.getElementById('center');
  c.innerHTML += `<div style="margin-top:6px"><button class="primary" onclick="location.reload()">Rejouer</button></div>`;
}
</script>
</body>
</html>
